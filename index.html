<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu-Bot | Grupo JB</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text);
            overflow: hidden;
        }

        header {
            padding: 1.5rem;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        header h1 {
            font-size: 1.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 1rem;
            border-radius: 1.2rem;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0.2rem;
        }

        .bot-message {
            align-self: flex-start;
            background: var(--glass);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 0.2rem;
        }

        #input-area {
            padding: 1.5rem;
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 0.8rem;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.8rem 1.2rem;
            border-radius: 2rem;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.1);
        }

        button {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .message { max-width: 90%; }
            header { padding: 1rem; }
        }

        .typing {
            font-style: italic;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>MEU-BOT GESTOR</h1>
    </header>

    <div id="chat-container">
        <div class="message bot-message">
            Olá! Sou o assistente do Grupo JB. Como posso te ajudar com os manuais internos hoje?
        </div>
    </div>

    <div id="typing-indicator" class="typing" style="padding-left: 1.5rem;">O bot está analisando os documentos...</div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Digite sua pergunta..." autocomplete="off">
        <button id="send-btn">Perguntar</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        async function sendMessage() {
            const question = userInput.value.trim();
            if (!question) return;

            // Add user message
            addMessage(question, 'user-message');
            userInput.value = '';
            
            // Show typing indicator
            typingIndicator.style.display = 'block';
            sendBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:5000/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();
                addMessage(data.answer, 'bot-message');
            } catch (error) {
                addMessage('Erro ao conectar com o servidor. Verifique se o backend está rodando.', 'bot-message');
            } finally {
                typingIndicator.style.display = 'none';
                sendBtn.disabled = false;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
